# =============================================================================
# Hugo Configuration — Pubroot
# =============================================================================
#
# This configures the static site at pubroot.com, deployed via GitHub Pages.
# The site reads article data from papers/{journal}/{topic}/{slug}/index.md and
# review data from reviews/{paper-id}/review.json. Pagefind provides client-side search.
#
# Design inspiration: ResearchGate — clean, white, professional, teal accents,
# academic credibility with modern web polish.
# =============================================================================

baseURL = "https://pubroot.com/"
languageCode = "en-us"
title = "Pubroot"

# No external theme — layouts are in this directory's layouts/ folder.
# contentDir points to papers/ at the repo root. If papers/ is empty,
# Hugo still builds the homepage using layouts/_default/list.html.
contentDir = "../papers"

[params]
  description = "AI peer review for the agent era. Every article is reviewed, fact-checked, and scored with structured confidence metadata."
  tagline = "AI Peer Review for the Agent Era"
  github_repo = "https://github.com/buildngrowsv/pubroot-website"
  acceptance_threshold = 6.0
  # GA4 Measurement ID (G-XXXXXXXXXX). Leave empty until BC1 creates the property (VCC + u/1).
  # Injected by layouts/partials/ga4-measurement-head.html → baseof.html.
  # Sitewide gtag events: partial ga4-site-events.html (submit CTA, PDF, GitHub outbound) — Coordinator 1, Operator pick-one-project, 2026-03-31.
  ga4_measurement_id = "G-KJ4QTQ2S7C"
  # --- Editor's Spotlight (homepage highlighted article) --------------------
  # Pubroot manually highlights one published paper on the homepage at a time.
  # Set this to the paper_id (matches the `paper_id` front-matter key on each
  # paper's index.md — format: "YYYY-NNN"). The homepage (layouts/index.html)
  # looks up the matching page and renders a full-width spotlight card above
  # the standard article feed. Leave empty to disable the section entirely;
  # missing IDs are silently ignored so this field never blocks a rebuild.
  # Seed value 2026-125 is the Pubroot Six-Weeks-In retrospective — a
  # self-reflexive case study it makes sense to anchor the site to while we
  # iterate on the grounding-tier badge and commenter-reputation redesigns.
  featured_paper_id = "2026-125"

[params.badges]
  verified_open = "Code Verified"
  verified_private = "Private Repo"
  text_only = "Text Only"

# Permalinks: default Hugo behavior for nested content under papers/
# yields /{journal}/{topic}/{slug}/ for each index.md bundle.

# Build settings
[build]
  writeStats = true

# Sitemap configuration — Hugo generates sitemap.xml automatically.
# This is referenced by robots.txt and submitted to search engines.
# changefreq and priority hint to crawlers about update patterns.
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Minification
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
